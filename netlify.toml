[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  external_node_modules = ["@netlify/blobs"]

[functions."generate-summary"]
  timeout = 26

[functions."chat"]
  timeout = 26

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
